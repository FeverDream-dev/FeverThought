name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm
          - platform: macos-13
            target: x86_64-apple-darwin
            artifact: macos-intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @feverthoth/desktop build:vite

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm --filter @feverthoth/desktop tauri
          tagName: ${{ github.ref_name }}
          releaseName: "FeverThoth IDE ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed

            See the changelog for details.

            ### Downloads
            - **Windows**: `.exe` installer or `.msi`
            - **macOS**: `.dmg` (Intel and Apple Silicon)
            - **Linux**: `.AppImage`, `.deb`, or `.rpm`

            > Built by FeverThoth CI from commit ${{ github.sha }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Publish release
        run: echo "All builds completed. Release is ready for review."
