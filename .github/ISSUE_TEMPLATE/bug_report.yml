name: Bug Report
description: Report a bug in FeverThoth IDE
labels: [type:bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue.
      placeholder: |
        1. Open project X
        2. Click on Y
        3. See error Z
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, FeverThoth version, etc.
      placeholder: |
        - OS: macOS 15 / Windows 11 / Ubuntu 24.04
        - FeverThoth version: 0.1.0
        - Ollama version (if relevant):
    validations:
      required: true
